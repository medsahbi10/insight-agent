name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (syntax + undefined names)
        run: ruff check src/ scripts/ tests/ --select=E9,F63,F7,F82,F821 --output-format=github

      - name: Show installed packages
        run: pip freeze

      - name: Pytest
        run: pytest tests/ -v --tb=long -rA

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: insight-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
